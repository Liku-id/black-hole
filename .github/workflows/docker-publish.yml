name: Publish Docker Image on PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - develop

jobs:
  build-and-push:
    # Hanya berjalan jika PR ditutup karena di-merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure git to use HTTPS instead of SSH
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          submodules: 'recursive'
          fetch-depth: 0
          token: ${{ secrets.WUKONG_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Mendapatkan commit hash pendek
      - name: Get short git commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./staging.dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/black-hole:${{ steps.vars.outputs.sha_short }}
